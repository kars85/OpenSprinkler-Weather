# .claude/skills.yaml — generated by bootstrap-skills.mjs
# Review every "TODO" before running sync-skills.mjs.

project:
  id: OpenSprinkler-Weather                            # also empirica project_id
  working_dir: C:\Dev\OpenSprinkler-Weather
  app_subdir: null                            # null when no sub-app exists
  default_branch: master                      # OSW's default branch is master, not main
  github:
    owner: kars85
    repo: OpenSprinkler-Weather

stack:
  description: "Node.js / TypeScript Express weather service (mocha + ts-node tests, tsc build, Docker-published)"
  conventions: "TypeScript via ts-node; Express route handlers in routes/; camelCase functions, PascalCase types. Preserve local PWS/Ecowitt backward compatibility — cloud providers (OWM/AccuWeather/Apple/Google) must stay OPTIONAL and never required for startup (WEATHER_PROVIDER=local). Keep changes small; run `npm run compile` and mocha tests. See AGENTS.md."
  styling: "N/A — backend HTTP service (no UI)"
  schema_path: null
  schema_postedit_cmd: null
  test_cmd: "npm test"                       # mocha (ts-node) — bare; templates prefix `cd APP_DIR &&`
  test_changed_cmd: "npm test"               # mocha has no --changed; same as test_cmd
  test_coverage_cmd: "npm test"              # no coverage tooling configured; runs the mocha suite
  build_cmd: "npm run compile"               # tsc
  audit_cmd: "npm audit --audit-level=high"
  audit_lockfile: package-lock.json

helpers:
  empirica: null                             # null → use _config\skills\bin\abc-empirica.mjs
  triage: null                               # null → use _config\skills\bin\abc-triage.mjs
  checkoff: scripts/abc-checkoff.mjs         # generic gh-based checklist toggle (created in this repo)

state_files:
  audit_hash: .abc-audit-hash
  failures: .abc-failures.json
  weights: .abc-weights.json

orchestration:
  codex_model: gpt-5.5
  codex_reasoning: high
  # Fast mode is the default (codex_fast_mode: true, codex_service_tier: fast).
  # Trades reasoning depth for ~3-5x latency reduction and lower cost.
  # Uncomment both lines below to opt out (or re-run bootstrap with --no-fast-mode).
  # codex_fast_mode: false
  # codex_service_tier: default
  codex_co_author: "Codex <noreply@openai.com>"

commits:
  scope: weather                              # → "feat(weather): ..."
  changelog_path: CHANGELOG.md

domain_paths: []                              # TODO: list { label, paths } for security-escalation

domain_triggers:                              # TODO: optional, used by /intake idea octo:debate auto-trigger
  octo_debate:
    compliance_keywords: []
    security_keywords: []
    schema_paths: []

labels:                                       # TODO: customize for project's GitHub label conventions
  priority_scheme: [P0, P1, P2, P3]
  category_scheme: {}                         # e.g. { feature: F-X, performance: P-X, quality: Q-X, security: S-X }
  process: [needs-decision, blocked, needs-investigation, bug]
  domains: []

empirica:
  project_id: OpenSprinkler-Weather
  reject_gap_threshold: 0.20
  warn_gap_threshold: 0.18
  loopall_kill_threshold: 0.25

skills:
  abc:
    enabled: true
  intake:
    enabled: true
